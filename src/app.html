<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* Paints the instant the document loads — before the SvelteKit bundle/CSS — so launch shows a
         spinner on a dark background instead of a flat default colour. Removed by +layout once the
         app mounts. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        transition: opacity 0.45s ease;
      }
      #boot-splash .spin {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f47521;
        animation: bootspin 0.8s linear infinite;
      }
      @keyframes bootspin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="boot-splash"><div class="spin"></div></div>
    <div id="root" data-input="dpad">%sveltekit.body%</div>
  </body>
</html>
